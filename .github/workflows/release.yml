name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    name: Build and attach HACS zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp manifest.json with the release tag
        run: |
          set -e
          # refs/tags/v0.1.3 -> 0.1.3
          version="${GITHUB_REF#refs/tags/}"
          version="${version#v}"
          echo "Release version: $version"
          jq --arg v "$version" '.version = $v' \
            custom_components/anova_bluetooth/manifest.json > manifest.tmp
          mv manifest.tmp custom_components/anova_bluetooth/manifest.json
          echo "--- resulting manifest.json ---"
          cat custom_components/anova_bluetooth/manifest.json

      - name: Build the zip
        run: |
          set -e
          cd custom_components/anova_bluetooth
          # HACS expects the component files at the ROOT of the zip,
          # not nested inside a folder.
          zip -r anova_bluetooth.zip . -x '*.zip'
          unzip -l anova_bluetooth.zip

      - name: Attach zip to the release
        uses: softprops/action-gh-release@v2
        with:
          files: custom_components/anova_bluetooth/anova_bluetooth.zip
